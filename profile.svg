<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="800" height="1420">
<foreignObject width="800" height="1420">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,div{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{background:#0d1117;color:#e6edf3;padding:32px 28px 28px;width:800px;min-height:1420px}
.greeting{font-family:'Courier New',monospace;font-size:12px;color:#3fb950;letter-spacing:.08em;margin-bottom:8px}
.greeting::before{content:'> '}
h1{font-size:36px;font-weight:800;color:#f0f6fc;line-height:1.1;margin-bottom:4px;letter-spacing:-.02em}
h1 span{color:#3fb950}
.tagline{font-size:14px;color:#8b949e;margin-top:10px;line-height:1.6;max-width:520px}
.tagline strong{color:#e6edf3;font-weight:600}
.exp-bar{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;border-radius:6px;padding:5px 11px;font-family:'Courier New',monospace;font-size:11px;font-weight:700;white-space:nowrap}
.ch-yr{background:#1a2f1c;border:1px solid #2ea043;color:#3fb950}
.ch-sep{color:#30363d;font-size:16px}
.ch-ibm{background:#0f1829;border:1px solid #1d4ed8;color:#60a5fa}
.ch-sh{background:#1c1a0a;border:1px solid #ca8a04;color:#fbbf24}
.ch-bk{background:#1a1025;border:1px solid #7c3aed;color:#c084fc}
.status{display:flex;align-items:center;gap:7px;background:#161b22;border:1px solid #30363d;border-radius:20px;padding:6px 14px 6px 10px;font-family:'Courier New',monospace;font-size:11px;color:#8b949e;white-space:nowrap;float:right;margin-top:0}
.dot{width:8px;height:8px;background:#3fb950;border-radius:50%;display:inline-block}
.hdiv{border:none;border-top:1px solid #21262d;margin:22px 0}
.sh{font-family:'Courier New',monospace;font-size:10px;color:#3fb950;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:#21262d;display:block}
.metrics{display:flex;gap:12px;margin-bottom:20px}
.metric{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px 18px;flex:1;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#3fb950,transparent)}
.mv{font-size:28px;font-weight:800;color:#3fb950;letter-spacing:-.02em;line-height:1;font-family:-apple-system,sans-serif}
.ml{font-size:11px;color:#8b949e;margin-top:4px;line-height:1.4}
.two{display:flex;gap:14px;margin-bottom:20px}
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:18px 20px;flex:1}
.ct{font-family:'Courier New',monospace;font-size:10px;color:#3fb950;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.ct::before{content:'// ';opacity:.4}
ul.bl{list-style:none;display:flex;flex-direction:column;gap:7px}
ul.bl li{font-size:13px;color:#c9d1d9;display:flex;align-items:baseline;gap:8px;line-height:1.4}
ul.bl li::before{content:'→';color:#3fb950;font-size:11px;flex-shrink:0;font-family:'Courier New',monospace}
.pub-wrap{margin-bottom:20px}
.pub-grid{display:flex;gap:12px}
.pub-card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:16px 18px;flex:1;position:relative;overflow:hidden}
.pub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c3aed,transparent)}
.pub-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.bi{font-size:20px;flex-shrink:0}
.pt{font-size:13px;font-weight:600;color:#e6edf3;line-height:1.4}
.ps{font-size:11px;color:#8b949e;font-style:italic;margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-family:'Courier New',monospace;font-size:10px;border-radius:4px;padding:2px 7px}
.tg-t{background:#1a1025;border:1px solid #7c3aed;color:#c084fc}
.tg-p{background:#0f1829;border:1px solid #1d4ed8;color:#93c5fd}
.tg-y{background:#161b22;border:1px solid #30363d;color:#8b949e}
.isbn-row{display:flex;align-items:center;gap:6px}
.ilab{font-family:'Courier New',monospace;font-size:10px;color:#484f58}
.ival{font-family:'Courier New',monospace;font-size:11px;color:#3fb950}
.stack-section{margin-bottom:20px}
.sg-label{font-size:11px;color:#484f58;font-family:'Courier New',monospace;margin-bottom:7px;letter-spacing:.04em}
.sg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:6px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 11px;font-family:'Courier New',monospace;font-size:12px;color:#c9d1d9;white-space:nowrap}
.ds{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.lang-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.connect-row{display:flex;align-items:center;justify-content:space-between;padding-top:18px;border-top:1px solid #21262d}
.cl{font-family:'Courier New',monospace;font-size:11px;color:#8b949e}
.clinks{display:flex;gap:10px}
.cbtn{display:inline-flex;align-items:center;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 14px;font-size:12px;color:#c9d1d9;font-family:'Courier New',monospace;text-decoration:none}
.fq{text-align:center;padding:16px 0 4px;font-family:'Courier New',monospace;font-size:11px;color:#484f58}
.fq span{color:#3fb950}
</style>
